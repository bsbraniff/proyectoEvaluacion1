<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Galería de Arte | Pinceladas Vivas</title>
    <link rel="stylesheet" href="assets/galeria.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous"/>
</head>
<body>
<!-- menu  -->
    <nav class="navbar navbar-expand-lg bg-dark border-bottom border-body py-3 mb-0 custom-navbar" data-bs-theme="dark">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <a class="navbar-brand text-white fs-4" href="#">Galería Vive</a>
            
            <!-- Botón hamburguesa para móvil -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse justify-content-center" id="navbarNavAltMarkup">
                <div class="navbar-nav gap-4">
                    <a class="nav-link text-white" href="index.html">Inicio</a>
                    <a class="nav-link text-white activo" href="galeria.html">Galería</a>
                    <a class="nav-link text-white" href="contacto.html">Contacto</a>
                </div>
            </div>
            
            <form class="d-flex" role="search">
                <input class="form-control me-2" type="search" placeholder="Buscar" aria-label="Buscar"/>
                <button class="btn btn-outline-light" type="submit">Buscar</button>
            </form>
        </div>
    </nav>
<!-- carrousel de imagenes-->
    <div id="carouselExampleIndicators" class="carousel slide">
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1" aria-label="Slide 2"></button>
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2" aria-label="Slide 3"></button>
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="3" aria-label="Slide 4"></button>
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="4" aria-label="Slide 5"></button>
            
        </div>
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="img/fondos1.jpeg" class="d-block w-100">
            </div>
            <div class="carousel-item">
                <img src="img/galeria3.jpg" class="d-block w-100">
            </div>
            <div class="carousel-item">
                <img src="img/fondos3.jpeg" class="d-block w-100">
            </div>
            <div class="carousel-item">
                <img src="img/foto3.jpg" class="d-block w-100">
            </div>
            <div class="carousel-item">
                <img src="img/fondos4.jpg" class="d-block w-100">
            </div>
            
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>

    <!-- Tarjetas imagenes -->
    <section class="galeria">
        <h2>Nuevas obras de arte en la Galería</h2>
        
        <div class="contenedor-cards" id="contenedor-cards"></div>

        
    </section>

<!-- Modal Bootstrap -->
    <div class="modal fade" id="modalObra" tabindex="-1" aria-labelledby="modalObraLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalObraLabel">Título de la obra</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body d-flex flex-column flex-md-row">
                    <img id="modalObraImagen" src="" class="img-fluid rounded mb-3 mb-md-0 me-md-3" style="max-width: 300px;" alt="Imagen de la obra">
                    <div>
                        <p id="modalObraAutor"><strong>Autor:</strong> </p>
                        <p id="modalObraDescripcion">Descripción de la obra.</p>
                        <p id="modalObraPrecio" class="fw-bold text-danger">Precio</p>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="js/galeria.js"></script>

        <!-- Footer -->
<footer class="footer">
    <div class="container">
        <p>© 2025 Galería Vive. Todos los derechos reservados.</p>
    </div>
</footer>
</body>
</html>
