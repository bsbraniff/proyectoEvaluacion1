<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contáctanos</title>

    <!-- BOOTSTRAP CSS (TE FALTABA) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ICONOS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <link rel="stylesheet" href="css/contacto.css">
</head>

<body>

<header>
    <nav class="d-flex justify-content-between p-3 bg-dark text-white">
        <h1>ConIngenio</h1>
        <ul class="d-flex gap-3 list-unstyled m-0">
            <li><a href="index.html" class="text-white">Inicio</a></li>
            <li><a href="servicios.html" class="text-white">Servicios</a></li>
            <li><a href="nosotros.html" class="text-white">Nosotros</a></li>
            <li><a href="contacto.html" class="text-white">Contacto</a></li>
        </ul>
    </nav>
</header>

<section class="contact-section">
    <div class="container">
        <div class="row align-items-center">

            <!-- IZQUIERDA (INFO) -->
            <div class="col-md-6 contact-info text-white">
                <h2 class="mb-4">Contáctanos</h2>
                <p><strong>Dirección:</strong> 3045 10 Sunrise Avenue</p>
                <p><strong>Teléfono:</strong> 123-456-7890</p>
                <p><strong>Horario:</strong> Lun a Vie: 9:00 - 20:00</p>
                <p><strong>Email:</strong> contactos@galeriavive.com</p>

                <div class="social-icons mt-4">
                    <a href="#"><i class="bi bi-facebook"></i></a>
                    <a href="#"><i class="bi bi-instagram"></i></a>
                    <a href="#"><i class="bi bi-twitter"></i></a>
                    <a href="#"><i class="bi bi-youtube"></i></a>
                </div>
            </div>

            <!-- DERECHA (FORMULARIO) -->
            <div class="col-md-6 d-flex justify-content-center">
                <div class="form-box p-4 rounded-4 shadow-lg">

                    <form id="form">
                        <div class="mb-3">
                            <label class="form-label">Nombre completo</label>
                            <input type="text" class="form-control" id="nombre">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Correo electrónico</label>
                            <input type="email" class="form-control" id="correo">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mensaje</label>
                            <textarea class="form-control" id="mensaje"></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Tipo de consulta</label>
                            <select class="form-select" id="tipo">
                                <option>Consulta</option>
                                <option>Venta</option>
                                <option>Compra</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-naranjo btn-custom">
                            ENVIAR
                        </button>
                    </form>

                </div>
            </div>

        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>

</body>
</html>
